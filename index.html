<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday My Dear</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffd6e5;
        overflow: hidden;
        font-family: Poppins, sans-serif;
      }

      /* Floating Hearts */

      .heart {
        position: absolute;
        color: #ff7aa5;
        animation: float 10s linear infinite;
        opacity: 0.4;
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-120px);
        }
      }

      .card {
        width: 380px;
        background: #f8cddb;
        border-radius: 30px;
        padding: 35px;
        text-align: center;
        position: relative;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        animation: pop 0.8s ease;
      }

      @keyframes pop {
        from {
          transform: scale(0.7);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      h1 {
        font-family: Pacifico;
        color: #9b1849;
        font-size: 40px;
      }

      h2 {
        font-family: Pacifico;
        color: #9b1849;
        font-size: 28px;
        margin-bottom: 20px;
      }

      .cake {
        font-size: 85px;
        animation: bounce 2s infinite;
      }

      @keyframes bounce {
        50% {
          transform: translateY(-12px);
        }
      }

      .question {
        margin: 25px 0;
        color: #7a1a42;
        font-size: 20px;
        font-weight: 600;
      }

      .btn-area {
        position: relative;
        height: 120px;
      }

      button {
        border: none;
        cursor: pointer;
        transition: 0.3s;
        font-size: 18px;
        font-weight: 600;
      }

      #yesBtn {
        background: #d81b60;
        color: white;
        padding: 15px 45px;
        border-radius: 40px;
        box-shadow: 0 10px 20px rgba(216, 27, 96, 0.3);
      }

      #yesBtn:hover {
        transform: scale(1.08);
      }

      #noBtn {
        position: absolute;
        left: 128px;
        top: 0px;
        color: #c2185b;
        padding: 15px 45px;
        border-radius: 40px;
        box-shadow: 0 10px 20px rgba(216, 27, 96, 0.3);
      }

      .action {
        display: none;
        animation: fade 0.8s;
        margin-top: 20px;
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .action h3 {
        color: #c2185b;
        margin-bottom: 15px;
      }

      .action button {
        background: #ff4f8a;
        color: white;
        padding: 12px 28px;
        border-radius: 30px;
      }

      .action button:hover {
        transform: scale(1.05);
      }

      .confetti {
        position: absolute;
        width: 12px;
        height: 18px;
        top: -20px;
        animation: fall linear forwards;
      }
      .d-none {
        display: none;
      }

      @keyframes fall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }
      /* card2 start */

      .container {
        text-align: center;
      }

      h1 {
        color: #555;
        margin-bottom: 30px;
        font-size: 32px;
      }

      .balloons {
        display: grid;
        grid-template-columns: repeat(2, 160px);
        gap: 35px;
        justify-content: center;
      }

      .box {
        width: 160px;
        height: 210px;
        position: relative;
      }

      .note {
        position: absolute;
        width: 150px;
        height: 170px;
        top: 10px;
        left: 5px;
        background: white;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
        font-size: 25px;
        font-weight: bold;
        color: #ff1493;
        box-shadow: 0 10px 25px #999;
        opacity: 0;
        transform: scale(0.2);
        transition: 0.6s;
      }

      .box.open .note {
        opacity: 1;
        transform: scale(1);
      }

      .balloon {
        width: 110px;
        height: 140px;
        position: absolute;
        left: 25px;
        top: 0;
        border-radius: 55% 55% 50% 50%;
        cursor: pointer;
        animation: float 3s infinite ease-in-out;

        box-shadow:
          inset -15px -20px 25px rgba(0, 0, 0, 0.2),
          inset 15px 15px 20px rgba(255, 255, 255, 0.5),
          0 15px 25px rgba(0, 0, 0, 0.2);
      }

      .balloon:before {
        content: "";
        position: absolute;
        width: 25px;
        height: 25px;
        background: white;
        opacity: 0.5;
        border-radius: 50%;
        top: 20px;
        left: 25px;
      }

      .balloon:after {
        content: "";
        position: absolute;
        width: 2px;
        height: 70px;
        background: #555;
        left: 54px;
        top: 140px;
      }

      .red {
        background: radial-gradient(circle at 30% 30%, #ffb6b6, #ff1744);
      }

      .blue {
        background: radial-gradient(circle at 30% 30%, #c4edff, #2196f3);
      }

      .green {
        background: radial-gradient(circle at 30% 30%, #d4ffcb, #20c967);
      }

      .yellow {
        background: radial-gradient(circle at 30% 30%, #fff9b0, #ffc107);
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(-3deg);
        }
        50% {
          transform: translateY(-18px) rotate(3deg);
        }
      }

      .pop {
        animation: explode 0.5s forwards !important;
      }

      @keyframes explode {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.5);
        }
        100% {
          transform: scale(0);
          opacity: 0;
        }
      }

      #final {
        display: none;
        margin-top: 40px;
        font-size: 38px;
        font-weight: bold;
        color: #ff1493;
        animation: pulse 1s infinite alternate;
      }

      @keyframes pulse {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.1);
        }
      }

      .heart {
        position: absolute;
        font-size: 25px;
        animation: heart 4s linear forwards;
      }

      @keyframes heart {
        0% {
          bottom: 0;
          opacity: 1;
        }
        100% {
          bottom: 100%;
          opacity: 0;
          transform: rotate(360deg);
        }
      }

      /* card3 */

      @import url("https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=Playfair+Display:wght@600&display=swap");

      #card3 .main {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #f8e8c8, #c9a875);
      }

      /* Old paper */
      .paper {
        width: 750px;
        min-height: 420px;

        padding: 60px 70px;

        background:
          linear-gradient(90deg, rgba(120, 70, 20, 0.08) 1px, transparent 1px),
          linear-gradient(rgba(120, 70, 20, 0.05) 1px, transparent 1px), #f7e7c2;

        background-size: 35px 35px;

        border-radius: 12px;

        position: relative;

        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.35),
          inset 0 0 80px rgba(100, 50, 10, 0.25);

        overflow: hidden;
      }

      /* burnt vintage edges */
      .paper:before {
        content: "";

        position: absolute;
        inset: 0;

        border-radius: 12px;

        box-shadow:
          inset 0 0 35px #7b4a1c,
          inset 0 0 80px rgba(90, 40, 10, 0.25);

        pointer-events: none;
      }

      /* Header */

      .title {
        text-align: center;

        font-family: "Playfair Display", serif;

        font-size: 38px;

        color: #5b3015;

        margin-bottom: 45px;

        text-shadow: 1px 1px #e8c99a;
      }

      /* Writing area */

      .writing {
        position: relative;

        font-family: "Caveat", cursive;

        font-size: 30px;

        color: #332015;

        direction: ltr;

        text-align: right;

        line-height: 1.6;
      }

      .char {
        display: inline-block;

        opacity: 0;

        animation: ink 0.35s forwards;
      }

      @keyframes ink {
        from {
          opacity: 0;

          transform: translateY(5px) rotate(-5deg);
        }

        to {
          opacity: 1;

          transform: translateY(0) rotate(0);
        }
      }

      /* Cursor */

      .cursor {
        width: 3px;

        height: 45px;

        background: #3b2112;

        display: inline-block;

        animation: blink 0.7s infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      /* Moving pen */

      .pen {
        position: absolute;

        right: -45px;

        top: 20px;

        font-size: 40px;

        transform: rotate(-35deg);

        animation: hand 0.3s infinite alternate;
      }

      @keyframes hand {
        from {
          transform: translateY(0) rotate(-35deg);
        }

        to {
          transform: translateY(6px) rotate(-25deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Hearts -->
    <script>
      for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = 15 + Math.random() * 20 + "px";
        heart.style.animationDuration = 5 + Math.random() * 6 + "s";
        heart.style.animationDelay = Math.random() * 5 + "s";
        document.body.appendChild(heart);
      }
    </script>

    <div class="card1 d-none" id="card1">
      <h1>Happy Birthday</h1>
      <h2>My Love</h2>

      <div class="cake">
        <img src="img1.png" style="width: 3em" />
      </div>

      <div class="question">Are you excited for what's next?</div>

      <div class="btn-area">
        <button id="yesBtn">Yes</button>

        <button id="noBtn">No</button>
      </div>

      <div class="action" id="actionDiv">
        <h3>🎉 Yay!! Let's begin the surprise!</h3>

        <button id="btn1_continue">Continue →</button>
      </div>
    </div>
    <div class="d-none card2" id="card2">
      <div class="container">
        <h1>🎈 Pop The Balloons 🎈</h1>

        <div class="balloons">
          <div class="box">
            <div class="note">YOU 💖</div>
            <div class="balloon red"></div>
          </div>

          <div class="box">
            <div class="note">ARE ✨</div>
            <div class="balloon blue"></div>
          </div>

          <div class="box">
            <div class="note">VERY 🌟</div>
            <div class="balloon green"></div>
          </div>

          <div class="box">
            <div class="note">SPECIAL ❤️</div>
            <div class="balloon yellow"></div>
          </div>
        </div>

        <div id="final">💖 YOU ARE VERY SPECIAL 💖</div>
      </div>
    </div>
    <div class="d-none card3" id="card3">
      <div>
        <div>
          <div class="paper">
            <div class="title">A Message From My Heart ❤</div>

            <div class="writing">
              <span id="text"></span>
              <span class="cursor"></span>

              <span class="pen">✒️</span>
            </div>
          </div>

          <script>
            const message =
              "Dear Srija,  Happy Birthday to someone truly special! You are Sweet Soul, Super Loyal, My Rock, and I'm so grateful to have you in my life. You bring so much warmth and sweetness into my life. Every moment with you is precious. you all the happiness, love, and joy that you deserve. May this year bring you countless beautiful mome Here's to celebrating you today and always!O With love and best wishes, Your Special Someone";

            let index = 0;

            const area1 = document.getElementById("text");

            function write() {
              if (index < message.length) {
                let span = document.createElement("span");

                span.className = "char";

                span.innerHTML =
                  message[index] === " " ? "&nbsp;" : message[index];

                area1.appendChild(span);

                index++;

                setTimeout(write, 110);
              }
            }

            write();
          </script>
        </div>
      </div>
    </div>
    <script>
      const noBtn = document.getElementById("noBtn");
      const area = document.querySelector(".btn-area");

      noBtn.addEventListener("mouseover", () => {
        const maxX = area.clientWidth - noBtn.offsetWidth;
        const maxY = area.clientHeight - noBtn.offsetHeight;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
      });

      const colors = [
        "#ff3b30",
        "#34c759",
        "#007aff",
        "#ffcc00",
        "#af52de",
        "#ff9500",
        "#00c7be",
      ];

      function createConfetti() {
        for (let i = 0; i < 180; i++) {
          const confetti = document.createElement("div");
          confetti.classList.add("confetti");

          confetti.style.left = Math.random() * window.innerWidth + "px";
          confetti.style.background =
            colors[Math.floor(Math.random() * colors.length)];

          confetti.style.width = Math.random() * 10 + 6 + "px";
          confetti.style.height = Math.random() * 15 + 8 + "px";

          confetti.style.animationDuration = Math.random() * 3 + 2 + "s";

          confetti.style.animationDelay = Math.random() * 0.5 + "s";

          confetti.style.transform = `rotate(${Math.random() * 360}deg)`;

          document.body.appendChild(confetti);

          setTimeout(() => {
            confetti.remove();
          }, 5500);
        }
      }

      createConfetti();
      setTimeout(() => {
        const el = document.querySelector("#card1");
        el.classList.remove("d-none");
      }, 5000);

      document.getElementById("yesBtn").addEventListener("click", () => {
        document.getElementById("actionDiv").style.display = "block";
        document.querySelector(".question").innerHTML =
          "❤️ I knew you'd say YES! ❤️";
        document.getElementById("noBtn").style.display = "none";

        createConfetti();
        document.getElementById("btn-area").style.display = "none";
      });

      document.getElementById("btn1_continue").addEventListener("click", () => {
        const el2 = document.querySelector("#card1");
        el2.classList.add("d-none");
        const el3 = document.querySelector("#card2");
        el3.classList.remove("d-none");
        createConfetti();
      });

      // card2 starts

      let count = 0;

      document.querySelectorAll(".balloon").forEach((balloon) => {
        balloon.onclick = function () {
          if (this.classList.contains("pop")) return;

          this.classList.add("pop");

          let box = this.parentElement;

          setTimeout(() => {
            this.style.display = "none";

            box.classList.add("open");

            count++;

            if (count === 4) {
              document.getElementById("final").style.display = "block";
              startHearts();

              setTimeout(() => {
                const el3 = document.querySelector("#card2");
                el3.classList.add("d-none");
                const el4 = document.querySelector("#card3");
                el4.classList.remove("d-none");
              }, 6000);
            }
          }, 500);
        };
      });

      function startHearts() {
        setInterval(() => {
          let heart = document.createElement("div");

          heart.className = "heart";

          heart.innerHTML = ["❤️", "💖", "💕", "✨"][
            Math.floor(Math.random() * 4)
          ];

          heart.style.left = Math.random() * window.innerWidth + "px";

          document.body.appendChild(heart);

          setTimeout(() => {
            heart.remove();
          }, 4000);
        }, 200);
      }
    </script>
  </body>
</html>
